events {}

http {
  log_format platform_json escape=json '{'
    '"timestamp":"$time_iso8601",'
    '"service":"ai-platform-ingress",'
    '"remote_addr":"$remote_addr",'
    '"request":"$request",'
    '"status":$status,'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time"'
  '}';

  access_log /var/log/nginx/access.log platform_json;

  upstream agent_api {
    server healthcare-agent-api:8000;
  }

  upstream llm_gateway {
    server enterprise-llm-gateway:8001;
  }

  server {
    listen 80;
    server_name healthcare-ai-platform.local;

    location /api/agent/ {
      proxy_pass http://agent_api/;
      proxy_set_header X-Request-Source enterprise-ingress;
      proxy_set_header Host $host;
    }

    location /api/llm/ {
      proxy_pass http://llm_gateway/;
      proxy_set_header X-Request-Source enterprise-ingress;
      proxy_set_header Host $host;
    }

    location /health {
      proxy_pass http://agent_api/health;
    }

    location /system-status {
      proxy_pass http://agent_api/system-status;
    }
  }
}
