global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: agent-api
    metrics_path: /metrics
    static_configs:
      - targets: ["agent-api:8000"]
        labels:
          service: healthcare-agent-api
          environment: local-enterprise-demo

  - job_name: llm-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["llm-gateway:8001"]
        labels:
          service: enterprise-llm-gateway
          environment: local-enterprise-demo
