name: HelixCare AI Platform Enterprise Release Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  architecture-readiness:
    name: Architecture Readiness & Platform Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Validate platform architecture assets
        run: |
          test -f docker-compose.yml
          test -f monitoring/prometheus/prometheus.yml
          test -f monitoring/grafana/dashboards/healthcare-ai-governance.json
          test -f dashboard-fail.html
          test -f dashboard.html
          test -f docs/ARCHITECTURE.md

      - name: Validate Grafana dashboard JSON
        run: python -m json.tool monitoring/grafana/dashboards/healthcare-ai-governance.json >/dev/null

      - name: Validate Docker Compose architecture
        run: docker compose -f docker-compose.yml config

  governance-policy-gate:
    name: AI Governance Policy Gate
    runs-on: ubuntu-latest
    needs: architecture-readiness
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install governance test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run guardrail and approval policy tests
        run: pytest tests -v

  application-quality-gate:
    name: Agent API & LLM Gateway Quality Gate
    runs-on: ubuntu-latest
    needs: governance-policy-gate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install service dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agent-api/requirements.txt
          pip install -r llm-gateway/requirements.txt
          pip install pytest

      - name: Validate Python source compiles
        run: |
          python -m compileall agent-api llm-gateway guardrails scripts

      - name: Validate policy engine import
        run: python -c "from guardrails.policy_engine import evaluate_policy; print(evaluate_policy('diagnose patient symptoms').status)"

  security-compliance-gate:
    name: Security & Compliance Gate
    runs-on: ubuntu-latest
    needs: application-quality-gate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security scanner
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Bandit security scan
        run: bandit -r agent-api llm-gateway guardrails scripts -ll

      - name: Check for accidental Python cache artifacts
        run: |
          if find . -path '*/__pycache__/*' -o -name '*.pyc' | grep -q .; then
            echo "Python cache artifacts found. Remove __pycache__ and *.pyc before release."
            find . -path '*/__pycache__/*' -o -name '*.pyc'
            exit 1
          fi

  container-build-gate:
    name: Container Build & Runtime Packaging Gate
    runs-on: ubuntu-latest
    needs: security-compliance-gate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Agent API container
        run: docker build -f agent-api/Dockerfile . -t healthcare-agent-api:ci

      - name: Build LLM Gateway container
        run: docker build -f llm-gateway/Dockerfile . -t enterprise-llm-gateway:ci

      - name: Inspect runtime images
        run: |
          docker image inspect healthcare-agent-api:ci --format 'Agent API image: {{.Id}}'
          docker image inspect enterprise-llm-gateway:ci --format 'LLM Gateway image: {{.Id}}'

  observability-runtime-gate:
    name: Prometheus & Grafana Runtime Observability Gate
    runs-on: ubuntu-latest
    needs: container-build-gate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run full observability gate
        run: bash scripts/ci_observability_gate.sh

  enterprise-release-summary:
    name: Enterprise Release Readiness Summary
    runs-on: ubuntu-latest
    needs:
      - architecture-readiness
      - governance-policy-gate
      - application-quality-gate
      - security-compliance-gate
      - container-build-gate
      - observability-runtime-gate
    if: always()
    steps:
      - name: Publish executive release gate summary
        run: |
          echo "## HelixCare AI Governance & Reliability Platform" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Purpose | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture Readiness | Compose, dashboards, docs, runtime assets | ${{ needs.architecture-readiness.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| AI Governance Policy | Guardrails, approvals, clinical-risk policy tests | ${{ needs.governance-policy-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Application Quality | Agent API and LLM Gateway code readiness | ${{ needs.application-quality-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security & Compliance | Bandit scan and artifact hygiene | ${{ needs.security-compliance-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Build | Agent API and LLM Gateway images | ${{ needs.container-build-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Observability Runtime | Docker Compose, Prometheus, Grafana, smoke, incident metrics | ${{ needs.observability-runtime-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Release story: governed AI runtime, policy enforcement, fallback routing, human approval workflow, Prometheus telemetry, Grafana command center." >> $GITHUB_STEP_SUMMARY
